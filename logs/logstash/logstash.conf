# INPUT
input {
    file {
        path => "/usr/share/logstash/logs/spring-boot-monitoring-log.log"
        start_position => "beginning"
        stat_interval => 1
    }
}

# FILTER
filter {

}

# OUTPUT
output {
    elasticsearch {
        hosts => ["http://spring-boot-monitoring-elasticsearch:9200"]
        index => "spring-boot-monitoring-logs-%{+YYYY.MM.dd}"
    }

    stdout { codec => rubydebug }
}